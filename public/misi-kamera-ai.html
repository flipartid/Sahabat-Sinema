<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simulasi Type of Shots</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #171717; margin: 0; overflow: hidden; }
    /* Menyembunyikan scrollbar agar UI terlihat seperti aplikasi native */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="text-white font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Konfigurasi API ---
    const urlParams = new URLSearchParams(window.location.search);
    const apiKey = urlParams.get('apiKey') || ""; 

    // --- Data Misi Pembelajaran (Tanpa Clue) ---
    const missionData = [
      { id: "S-01", title: "Operasi Alpha", target: "Extreme Long Shot", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-02", title: "Operasi Bravo", target: "Long Shot", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-03", title: "Operasi Charlie", target: "Medium Long Shot", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-04", title: "Operasi Delta", target: "Medium Shot", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-05", title: "Operasi Echo", target: "Medium Close Up", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-06", title: "Operasi Foxtrot", target: "Close Up", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-07", title: "Operasi Golf", target: "Big Close Up", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "S-08", title: "Operasi Hotel", target: "Extreme Close Up", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-01", title: "Sudut Alpha", target: "High Angle", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-02", title: "Sudut Bravo", target: "Eye Level", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-03", title: "Sudut Charlie", target: "Low Angle", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-04", title: "Sudut Delta", target: "Dutch Angle", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-05", title: "Sudut Echo", target: "Worm Eye", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" },
      { id: "A-06", title: "Sudut Foxtrot", target: "Bird View", desc: "[ Tanpa Petunjuk - Uji Ingatan Anda ]" }
    ];

    const fetchWithRetry = async (url, options, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    };

    const analyzeImageWithGemini = async (base64Image, activeMission) => {
      if (!apiKey || apiKey === "undefined") {
        return "API Key tidak ditemukan. Pastikan environment variable GEMINI_API_KEY sudah diatur.";
      }
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const base64Data = base64Image.split(',')[1];
      const mimeTypeMatch = base64Image.match(/data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+).*,.*/);
      const mimeType = mimeTypeMatch ? mimeTypeMatch[1] : "image/jpeg";

      const missionContext = activeMission 
        ? `\n\n[TARGET MISI AKTIF]\nSiswa sedang menjalankan misi uji kompetensi untuk mendapatkan hasil: "${activeMission.target}".\nEvaluasi secara ketat dan tegas apakah gambar ini BERHASIL atau GAGAL memenuhi target misi tersebut di bagian STATUS.`
        : "";

      const prompt = `Sebagai penguji fotografi, analisis gambar ini secara singkat berdasarkan standar berikut:

      [TYPE OF SHOTS]
      - Extreme long shot / Established Shot: subjek sangat jauh.
      - Long shot / Full shot: seluruh badan hingga headroom.
      - Medium long shot: dari betis hingga headroom.
      - Medium Shot: pinggang/pinggul hingga headroom.
      - Medium close up: dada hingga headroom.
      - Close Up: bahu hingga headroom.
      - Big Close Up: dagu hingga kening.
      - Extreme Close Up: detail sangat dekat (seperti mata).

      [CAMERA ANGLE]
      - High Angle: kamera lebih tinggi dari subjek.
      - Eye Level: sejajar mata subjek.
      - Low Angle: kamera di bawah subjek.
      - Dutch Angle: sudut diagonal/miring.
      - Worm Eye: kamera di tanah.
      - Bird view: dari tempat sangat tinggi.
      ${missionContext}

      Format Balasan (Gunakan bahasa Indonesia baku dan santai):
      TYPE OF SHOT: [Sebutkan jenis] - [Alasan singkat]
      CAMERA ANGLE: [Sebutkan sudut] - [Alasan/kesan singkat]
      STATUS: [Jika Misi Aktif, WAJIB tulis "MISI BERHASIL:" atau "MISI GAGAL:" diikuti alasannya. Jika mode bebas, tulis 1 kalimat kesimpulan komposisi]`;

      const payload = {
        contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: base64Data } }] }]
      };

      try {
        const data = await fetchWithRetry(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal memproses gambar. Coba lagi.";
      } catch (error) {
        console.error("AI Analysis Error:", error);
        return "Koneksi ke AI terputus. Pastikan internet stabil dan coba lagi.";
      }
    };

    function App() {
      const [stream, setStream] = useState(null);
      const [capturedImage, setCapturedImage] = useState(null);
      const [isUploaded, setIsUploaded] = useState(false); // FIXED: State ditambahkan
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analysisResult, setAnalysisResult] = useState("");
      const [cameraError, setCameraError] = useState("");
      const [showResult, setShowResult] = useState(true); 
      const [showMissionModal, setShowMissionModal] = useState(false); 
      const [showForm, setShowForm] = useState(false);
      
      const [missionQueue, setMissionQueue] = useState([]);
      const [activeMission, setActiveMission] = useState(null); 
      const [completedCount, setCompletedCount] = useState(0);
      const [isAllCompleted, setIsAllCompleted] = useState(false);
      
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (!capturedImage && !isAllCompleted) {
          startCamera();
        } else {
          stopCamera();
        }
        return () => stopCamera();
      }, [capturedImage, isAllCompleted]);

      useEffect(() => {
        if (videoRef.current && stream) {
          videoRef.current.srcObject = stream;
        }
      }, [stream]);

      const startCamera = async () => {
        setCameraError("");
        try {
          const mediaStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', aspectRatio: 16/9, width: { ideal: 1920 }, height: { ideal: 1080 } } 
          });
          setStream(mediaStream);
        } catch (err) {
          console.error("Gagal mengakses kamera:", err);
          setCameraError("Kamera ditolak atau tidak tersedia. Pastikan Anda mengizinkan akses dan membukanya di koneksi aman (HTTPS). Gunakan tombol Upload Gambar sebagai alternatif.");
        }
      };

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          setStream(null);
        }
      };

      const handleCapture = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video = videoRef.current;
        const canvas = canvasRef.current;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const base64Data = canvas.toDataURL('image/jpeg', 0.8);
        setCapturedImage(base64Data);
        setIsUploaded(false); // FIXED: Set status upload ke false
        setShowResult(true);
        stopCamera();
        processAnalysis(base64Data);
      };

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = () => {
          const base64Data = reader.result;
          setCapturedImage(base64Data);
          setIsUploaded(true); // FIXED: Set status upload ke true
          setShowResult(true);
          stopCamera();
          processAnalysis(base64Data);
        };
        reader.readAsDataURL(file);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const processAnalysis = async (base64Data) => {
        setIsAnalyzing(true);
        setAnalysisResult("");
        const resultText = await analyzeImageWithGemini(base64Data, activeMission);
        setAnalysisResult(resultText);
        setIsAnalyzing(false);
      };

      const retakePhoto = () => {
        setCapturedImage(null);
        setAnalysisResult("");
        setShowResult(true);
        setIsUploaded(false); // FIXED: Reset status upload
      };

      const startRandomMissions = () => {
        const shuffled = [...missionData].sort(() => 0.5 - Math.random()).slice(0, 6);
        setActiveMission(shuffled[0]);
        setMissionQueue(shuffled.slice(1));
        setCompletedCount(0);
        setIsAllCompleted(false);
        setShowMissionModal(false);
        setCapturedImage(null);
        setIsUploaded(false);
        setAnalysisResult("");
        setShowForm(false);
      };

      const proceedNextMission = () => {
        if (missionQueue.length > 0) {
          setCompletedCount(prev => prev + 1);
          setActiveMission(missionQueue[0]);
          setMissionQueue(prev => prev.slice(1));
          setCapturedImage(null);
          setIsUploaded(false);
          setAnalysisResult("");
        } else {
          setCompletedCount(prev => prev + 1);
          setIsAllCompleted(true);
          setActiveMission(null);
        }
      };

      const abortMission = () => {
        setActiveMission(null);
        setMissionQueue([]);
        setCompletedCount(0);
        setShowMissionModal(false);
        setCapturedImage(null);
        setIsUploaded(false);
        setShowForm(false);
      };

      // Tampilan Komponen
      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full bg-neutral-950 sm:p-6">
          <div className="relative w-full max-w-6xl aspect-[16/9] bg-black sm:rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] sm:border border-gray-800 flex flex-col">
          
          {/* --- TOP BAR --- */}
          {!isAllCompleted && (
            <div className="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-30 bg-gradient-to-b from-black/80 to-transparent">
              <h1 className="font-bold text-lg tracking-wide drop-shadow-md">ShotMaster</h1>
              <button 
                onClick={() => setShowMissionModal(true)}
                className={`px-4 py-1.5 rounded-full text-xs font-bold shadow-lg transition ${activeMission ? 'bg-blue-600 text-white animate-pulse' : 'bg-white/20 text-white backdrop-blur'}`}
              >
                {activeMission ? `MISI: ${completedCount + 1}/6` : 'MODE BEBAS'}
              </button>
            </div>
          )}

          {/* --- MAIN CAMERA VIEWFINDER --- */}
          {isAllCompleted ? (
            showForm ? (
              <div className="flex flex-col w-full h-full bg-white animate-[fade-in_0.3s_ease-out]">
                <div className="flex justify-between items-center p-4 bg-blue-600 text-white shadow-md z-10">
                  <h2 className="font-bold tracking-widest text-sm flex items-center"><i className="fas fa-clipboard-list mr-2"></i> ISI IDENTITAS & EVALUASI</h2>
                  <button onClick={() => { setIsAllCompleted(false); setShowForm(false); retakePhoto(); }} className="w-8 h-8 flex items-center justify-center bg-white/20 hover:bg-white/40 rounded-full transition">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                <div className="flex-grow w-full relative">
                  <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLSeuYWjtCpeIGeOEybry0zFtKV_zzRYQd_0WY9ZRzI2sAshZ1Q/viewform?embedded=true" 
                    className="absolute inset-0 w-full h-full"
                    frameBorder="0" 
                    marginHeight="0" 
                    marginWidth="0">
                    Loading…
                  </iframe>
                </div>
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center h-full p-6 sm:p-10 bg-neutral-900 overflow-y-auto animate-[fade-in_0.5s_ease-out]">
                <div className="flex flex-col items-center mb-10">
                  <i className="fas fa-trophy text-6xl text-yellow-400 mb-6 drop-shadow-[0_0_25px_rgba(250,204,21,0.6)] animate-bounce"></i>
                  <h2 className="text-3xl sm:text-4xl text-cyan-400 font-bold tracking-widest mb-2 text-center">SELAMAT!</h2>
                  <h3 className="text-xl sm:text-2xl text-white font-bold mb-4 text-center">SEMUA MISI SELESAI</h3>
                  <p className="text-gray-400 text-sm text-center max-w-md leading-relaxed">
                    Luar biasa! Anda telah berhasil menyelesaikan ke-6 misi simulasi <i className="text-gray-300">Type of Shots</i> & <i className="text-gray-300">Camera Angle</i>.
                  </p>
                </div>
                
                <div className="w-full max-w-xs flex flex-col gap-4">
                  <button 
                    onClick={() => setShowForm(true)} 
                    className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm font-bold shadow-[0_0_20px_rgba(37,99,235,0.4)] transition transform hover:scale-105 flex items-center justify-center"
                  >
                    <i className="fas fa-clipboard-list mr-2"></i> ISI IDENTITAS
                  </button>
                  <button 
                    onClick={() => { setIsAllCompleted(false); retakePhoto(); }} 
                    className="w-full py-4 bg-transparent border border-gray-600 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl text-sm font-bold transition flex items-center justify-center"
                  >
                    KEMBALI KE KAMERA
                  </button>
                </div>
              </div>
            )
          ) : (
            <div className="relative flex-grow flex flex-col bg-black overflow-hidden h-full">
              
              {/* Pesan Error Jika Kamera Diblokir */}
              {cameraError && !capturedImage && (
                <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-20">
                  <i className="fas fa-video-slash text-4xl text-gray-500 mb-4"></i>
                  <p className="text-sm text-gray-300 mb-6">{cameraError}</p>
                </div>
              )}

              {/* Elemen Video / Gambar */}
              <video ref={videoRef} autoPlay playsInline muted className={`absolute inset-0 w-full h-full object-cover ${capturedImage ? 'hidden' : 'block'}`} />
              <canvas ref={canvasRef} className="hidden" />
              {capturedImage && (
                <img src={capturedImage} alt="Captured" className={`absolute inset-0 w-full h-full ${isUploaded ? 'object-contain' : 'object-cover'}`} />
              )}

              {/* Grid Guides (Rule of Thirds) */}
              <div className="absolute inset-0 pointer-events-none opacity-20">
                <div className="w-full h-1/3 border-b border-white"></div>
                <div className="w-full h-1/3 border-b border-white"></div>
                <div className="absolute top-0 left-1/3 w-px h-full bg-white"></div>
                <div className="absolute top-0 left-2/3 w-px h-full bg-white"></div>
              </div>

              {/* Target Misi Overlay */}
              {activeMission && !capturedImage && (
                <div className="absolute top-20 left-4 z-20 bg-black/60 backdrop-blur-md p-3 rounded-lg border border-white/10 max-w-[200px]">
                  <div className="text-[10px] text-blue-400 font-bold mb-1"><i className="fas fa-bullseye mr-1 animate-pulse"></i> TARGET:</div>
                  <div className="text-lg font-bold text-white mb-1 leading-tight">{activeMission.target}</div>
                </div>
              )}

              {/* --- FLOATING AI RESULT CARD --- */}
              {capturedImage && (
                <div className={`absolute bottom-28 left-4 right-4 md:left-auto md:right-8 md:w-[400px] z-40 transition-transform duration-500 ${showResult ? 'translate-y-0 opacity-100' : 'translate-y-[150%] opacity-0'}`}>
                  <div className="bg-white text-gray-900 rounded-2xl shadow-2xl overflow-hidden relative border border-gray-200">
                    {/* Header Card */}
                    <div className="bg-gray-50 p-3 border-b border-gray-200 flex justify-between items-center">
                      <h3 className="text-xs font-bold text-gray-700 flex items-center">
                        <i className="fas fa-robot text-blue-500 mr-2"></i> EVALUASI AI
                      </h3>
                      <button onClick={() => setShowResult(false)} className="w-6 h-6 flex items-center justify-center bg-gray-200 rounded-full text-gray-600 hover:bg-gray-300">
                        <i className="fas fa-times text-xs"></i>
                      </button>
                    </div>
                    
                    {/* Konten Card */}
                    <div className="p-4 max-h-[35vh] overflow-y-auto">
                      {isAnalyzing ? (
                        <div className="flex flex-col items-center justify-center py-6 text-gray-500">
                          <i className="fas fa-circle-notch fa-spin text-3xl text-blue-500 mb-3"></i>
                          <p className="text-xs font-bold animate-pulse">Memproses Komposisi...</p>
                        </div>
                      ) : (
                        <div className="text-sm">
                          {analysisResult.split('\n').map((paragraph, index) => {
                            if (!paragraph.trim()) return null;
                            const isSuccess = paragraph.includes('BERHASIL');
                            const isFailed = paragraph.includes('GAGAL');
                            let className = "mb-2 leading-relaxed ";
                            if (isSuccess) className += "text-green-600 font-bold p-2 bg-green-50 rounded mt-3";
                            else if (isFailed) className += "text-red-600 font-bold p-2 bg-red-50 rounded mt-3";
                            else className += "text-gray-700";
                            
                            return <p key={index} className={className}>{paragraph}</p>;
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* Tombol Pemanggil Floating Result jika disembunyikan */}
              {capturedImage && !showResult && !isAnalyzing && (
                <button 
                  onClick={() => setShowResult(true)} 
                  className="absolute bottom-28 left-1/2 -translate-x-1/2 z-30 bg-blue-600 text-white px-5 py-2 rounded-full shadow-xl text-xs font-bold animate-bounce"
                >
                  <i className="fas fa-chevron-up mr-2"></i>Tampilkan Hasil
                </button>
              )}

              {/* --- BOTTOM CONTROL BAR (VIEWFINDER) --- */}
              <div className="absolute bottom-0 left-0 w-full h-28 bg-gradient-to-t from-black via-black/80 to-transparent flex justify-between items-center px-8 z-30">
                
                {/* Tombol Kiri (Upload) */}
                <div className="w-12 h-12 flex items-center justify-center">
                  {!capturedImage && (
                    <button onClick={() => fileInputRef.current?.click()} className="text-white bg-white/20 p-3 rounded-full hover:bg-white/30 transition shadow-lg">
                      <i className="fas fa-image text-lg"></i>
                    </button>
                  )}
                  <input type="file" accept="image/*" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                </div>

                {/* Tombol Tengah (Jepret / Retake / Next) */}
                <div className="flex-grow flex justify-center">
                  {!capturedImage ? (
                    // Tombol Jepret (Putih Bulat Khas Kamera)
                    <button onClick={handleCapture} className="w-16 h-16 rounded-full border-4 border-white bg-white/30 backdrop-blur-sm flex items-center justify-center active:scale-95 transition shadow-lg">
                      <div className="w-12 h-12 bg-white rounded-full"></div>
                    </button>
                  ) : activeMission && analysisResult.includes('BERHASIL') ? (
                    // Tombol Next Mission (Hijau)
                    <button onClick={proceedNextMission} className="w-16 h-16 rounded-full bg-green-500 text-white flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.5)] active:scale-95 transition animate-pulse">
                      <i className="fas fa-arrow-right text-2xl"></i>
                    </button>
                  ) : (
                    // Tombol Retake (Ulangi - Merah)
                    <button onClick={retakePhoto} className="flex flex-col items-center justify-center w-16 h-16 bg-red-500 text-white rounded-full shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95 transition">
                      <i className="fas fa-redo-alt text-xl mb-0.5"></i>
                    </button>
                  )}
                </div>

                {/* Tombol Kanan (Kosong untuk keseimbangan / Spacer) */}
                <div className="w-12 h-12"></div>

              </div>
            </div>
          )}
          
          {/* --- MODAL MULAI MISI / ABORT --- */}
          {showMissionModal && (
            <div className="absolute inset-0 z-50 bg-black/90 backdrop-blur-md flex flex-col justify-center items-center p-6 animate-[fade-in_0.2s_ease-out]">
              <div className="w-full max-w-sm bg-neutral-900 border border-gray-700 rounded-3xl p-6 flex flex-col items-center text-center shadow-2xl relative">
                
                <button onClick={() => setShowMissionModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white">
                  <i className="fas fa-times text-xl"></i>
                </button>

                <div className="w-16 h-16 bg-blue-600/20 text-blue-500 rounded-full flex items-center justify-center mb-4">
                  <i className="fas fa-bullseye text-3xl"></i>
                </div>
                
                <h3 className="text-xl font-bold mb-2">Manajemen Misi</h3>
                <p className="text-gray-400 text-xs mb-6 px-4">Pilih mode tantangan sistem. Misi acak akan menguji kemampuan framing gambar Anda secara berurutan.</p>

                {activeMission ? (
                  <div className="w-full space-y-3">
                    <button onClick={() => setShowMissionModal(false)} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm">
                      LANJUTKAN MISI AKTIF
                    </button>
                    <button onClick={abortMission} className="w-full py-3 bg-red-500/10 text-red-500 border border-red-500/30 rounded-xl font-bold text-sm">
                      HENTIKAN MISI (MODE BEBAS)
                    </button>
                  </div>
                ) : (
                  <button onClick={startRandomMissions} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/30">
                    MULAI 6 MISI ACAK
                  </button>
                )}
              </div>
            </div>
          )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
